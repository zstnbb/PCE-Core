# SPDX-License-Identifier: Apache-2.0
# Nightly Probe — P5.C.3 deliverable per HANDOFF-META-PIPELINE-KICKOFF §4.P5.C.3.
#
# Goal: every UTC 02:00, exercise the conductor + render the health matrix
# SVG + auto-create a GitHub issue for any non-pass run record. This is the
# "auto-eyes" mechanism contracted by ADR-019 §3 — the project owner does
# not need to manually inspect each lane every day; broken adapters surface
# as actionable issues within 24h of their first failure.
#
# Three jobs in sequence:
#   1. ``smoke``           — install + run the conductor's self-tests (~6 s)
#   2. ``health-matrix``   — render the SVG + commit if changed
#   3. ``auto-issue``      — open issues for failed runs in pce_test_conductor/runs/
#
# Live e2e probes (browser / desktop) are deliberately NOT run on this CI
# because GH-hosted runners lack browser logins + Claude Desktop. Those
# come from the project owner's local machine; this workflow exercises the
# orchestration layer + reports.
#
# References:
#   - Docs/handoff/HANDOFF-META-PIPELINE-KICKOFF-2026-05-12.md §4.P5.C.3
#   - Docs/docs/engineering/adr/ADR-017-test-conductor-...md (Test Conductor)
#   - Docs/docs/engineering/adr/ADR-019-maintenance-as-first-class-concern.md
#   - Docs/stability/PCE-PIPELINE-HEALTH-MATRIX.md §5.3 (auto-issue body shape)

name: Nightly Probe

on:
  schedule:
    # 02:00 UTC daily — picked to be after most upstream UI deploy windows.
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      hours_back:
        description: "Hours of run history to scan for auto-issue (default 24)"
        required: false
        default: "24"
      window_hours:
        description: "Window for compute_matrix (default 24)"
        required: false
        default: "24"
      dry_run_issues:
        description: "Skip actual gh issue create (true = preview only)"
        required: false
        default: "false"

permissions:
  contents: write          # commit the rendered SVG back to the repo
  issues: write            # auto_issue_on_fail.py needs gh issue create

jobs:
  # -------------------------------------------------------------------------
  # 1. Smoke — make sure the conductor itself isn't broken.
  # -------------------------------------------------------------------------
  smoke:
    name: Conductor smoke (37 tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime + test deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi
          # Conductor + health are stdlib + pyyaml + jsonschema + fastapi-testclient.
          python -m pip install pytest pyyaml jsonschema "fastapi[standard]" pydantic mcp

      - name: Run conductor + health beacon tests
        run: |
          python -m pytest tests/test_conductor.py tests/test_health_beacon.py -v --tb=short

  # -------------------------------------------------------------------------
  # 2. Health matrix — render the SVG and commit if changed.
  # -------------------------------------------------------------------------
  health-matrix:
    name: Render HEALTH-MATRIX.svg
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history so the auto-commit step can push back.
          fetch-depth: 0
          # Use a token that can push (defaults are PAT-less).
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install minimal runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml jsonschema "fastapi[standard]" pydantic

      - name: Initialise PCE Core DB (empty health_beacons)
        # Ensures pce_core.health.compute_matrix doesn't crash when called
        # against a pristine GH runner. Real beacon data flows from
        # individual contributors' local runs, not from CI.
        run: |
          python -c "from pce_core.db import init_db; init_db()"

      - name: Render health matrix SVG
        run: |
          window_hours="${{ github.event.inputs.window_hours || '24' }}"
          python -m tools.render_health_matrix \
            --output Docs/stability/HEALTH-MATRIX.svg \
            --window-hours "$window_hours"

      - name: Commit SVG if changed
        # peter-evans/create-pull-request is overkill for a single SVG;
        # we just push directly to the same branch using the workflow
        # token. Falls back to a no-op commit-less push if file unchanged.
        run: |
          git config user.name "pce-nightly-probe[bot]"
          git config user.email "pce-nightly-probe@users.noreply.github.com"
          if git diff --quiet -- Docs/stability/HEALTH-MATRIX.svg; then
            echo "SVG unchanged — nothing to commit."
            exit 0
          fi
          git add Docs/stability/HEALTH-MATRIX.svg
          git commit -m "chore(nightly): refresh HEALTH-MATRIX.svg [skip ci]"
          git push

  # -------------------------------------------------------------------------
  # 3. Auto-issue on fail — read pce_test_conductor/runs/, open issues.
  # -------------------------------------------------------------------------
  auto-issue:
    name: Auto-issue on fail
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install minimal runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml jsonschema pydantic

      - name: Auto-create issues for failed runs
        env:
          # gh CLI authenticates from this token automatically on GH-hosted runners.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          hours_back="${{ github.event.inputs.hours_back || '24' }}"
          dry_run="${{ github.event.inputs.dry_run_issues || 'false' }}"

          if [ "$dry_run" = "true" ]; then
            python -m tools.auto_issue_on_fail \
              --hours-back "$hours_back" \
              --runs-dir pce_test_conductor/runs
          else
            python -m tools.auto_issue_on_fail \
              --hours-back "$hours_back" \
              --runs-dir pce_test_conductor/runs \
              --no-dry-run \
              --repo "$GITHUB_REPOSITORY"
          fi

  # -------------------------------------------------------------------------
  # 4. Redundancy matrix — render REDUNDANCY-MATRIX.svg + check 13 P0
  #    redundancy targets + auto-issue on degradation (W5-T1, W5-T2).
  # -------------------------------------------------------------------------
  redundancy-matrix:
    name: Redundancy matrix + check (W5)
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install minimal runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml jsonschema "fastapi[standard]" pydantic

      - name: Initialise PCE Core DB
        run: |
          python -c "from pce_core.db import init_db; init_db()"

      - name: Boot supervisor (background) for /status data
        # The render + check tools both prefer live /status. We start the
        # FastAPI app in a background process; if it doesn't come up the
        # render tool falls back to scenarios.yaml (all-grey) and the check
        # tool reports 0 alerts (CI keeps going).
        run: |
          (python -m uvicorn pce_core.server:app \
              --host 127.0.0.1 --port 9800 \
              --log-level warning &) >/dev/null 2>&1
          # Wait up to 15s for /status to respond.
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:9800/api/v1/supervisor/status > /dev/null; then
              echo "supervisor up after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Render REDUNDANCY-MATRIX.svg
        run: |
          python -m tools.render_redundancy_matrix \
              --status-url http://127.0.0.1:9800/api/v1/supervisor/status \
              --scenarios-yaml pce_core/capture_supervisor/scenarios.yaml \
              --out Docs/stability/REDUNDANCY-MATRIX.svg

      - name: Commit matrix back to repo
        run: |
          git config user.name "pce-nightly-probe[bot]"
          git config user.email "pce-nightly-probe@users.noreply.github.com"
          if git diff --quiet -- Docs/stability/REDUNDANCY-MATRIX.svg; then
            echo "REDUNDANCY-MATRIX.svg unchanged — nothing to commit."
            exit 0
          fi
          git add Docs/stability/REDUNDANCY-MATRIX.svg
          git commit -m "chore(nightly): refresh REDUNDANCY-MATRIX.svg [skip ci]"
          git push

      - name: Check P0 redundancy targets
        id: redundancy_check
        run: |
          python -m tools.check_redundancy_targets \
              --status-url http://127.0.0.1:9800/api/v1/supervisor/status \
              --threshold red \
              --output redundancy_alerts.json
        continue-on-error: true

      - name: Open auto-issues for redundancy degradation
        if: steps.redundancy_check.outputs.alert_count > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dry_run="${{ github.event.inputs.dry_run_issues || 'false' }}"
          if [ "$dry_run" = "true" ]; then
            python -m tools.auto_issue_on_redundancy_degraded \
                --alerts redundancy_alerts.json
          else
            python -m tools.auto_issue_on_redundancy_degraded \
                --alerts redundancy_alerts.json \
                --no-dry-run \
                --repo "$GITHUB_REPOSITORY"
          fi
