# SPDX-License-Identifier: Apache-2.0
# Auto-issue template — W5-T3 deliverable per
# Docs/stability/redundancy-sprint/05-wave5-nightly-closure.md §4.
name: 🔴 Redundancy Degradation
description: A P0 scenario has fewer V-GREEN legs than its redundancy target.
title: "[redundancy-degraded] {scenario_id}: {legs_active}/{redundancy_target} legs"
labels: ["redundancy-degraded", "auto-detected"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Auto-filed by `tools/auto_issue_on_redundancy_degraded.py`.
        Canonical state lives in `Docs/stability/REDUNDANCY-AUDIT-MATRIX.md`;
        sprint scope is locked in
        `Docs/stability/redundancy-sprint/SCOPE-LOCK-2026-05-15.md`.

  - type: input
    id: scenario_id
    attributes:
      label: Scenario ID
      description: e.g. `f4_p1_claude_desktop`
    validations:
      required: true

  - type: dropdown
    id: status
    attributes:
      label: Current status
      options: [redundant, minimal, impaired, down]
    validations:
      required: true

  - type: input
    id: legs_active
    attributes:
      label: legs_active / redundancy_target
      description: Snapshot value at the time the alert fired.
    validations:
      required: true

  - type: textarea
    id: failed_legs
    attributes:
      label: Which legs are failing?
      description: per-leg health snapshot (source / basis / last_pass / last_fail)
    validations:
      required: true

  - type: textarea
    id: last_pass_per_leg
    attributes:
      label: Last PASS per leg
      description: timestamp of the most recent PASS in the 24h window per leg
    validations:
      required: false

  - type: textarea
    id: recommended_repair
    attributes:
      label: Recommended repair (auto-generated)
      description: |
        Try `python -m tools.repair_adapter --redundancy-degraded <scenario_id> --json`;
        attach the proposal here for the reviewer.
    validations:
      required: false

  - type: checkboxes
    id: scope_check
    attributes:
      label: Sanity checks
      options:
        - label: Scenario is in `SCOPE-LOCK-2026-05-15.md` §2 (P0 13)
          required: true
        - label: This is NOT a Phase B scenario expected to be impaired
          required: false
