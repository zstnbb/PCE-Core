[pytest]
testpaths = tests
markers =
    e2e: End-to-end browser capture tests (require Chrome + PCE Core running)
    pce_probe: Probe-driven E2E matrix tests (require sideload extension attached + PCE Core running). Honour the --pce-probe-skip CLI flag exposed by pce_probe.pytest_plugin.
    e2e_mcp: End-to-end MCP stdio protocol tests (spawn `python -m pce_mcp` as subprocess and exercise tools/* JSON-RPC frames; no external dependencies, agent-self-loop runnable).
    e2e_l3g: End-to-end tests for pce_persistence_watcher (UCS layer L3g, ADR-018). Hermetic — synthesise a Claude-Desktop-style local-agent-mode-sessions/ tree under tmp_path and exercise discovery / parser / observer / CLI against an isolated PCE sqlite DB. No real Claude / ChatGPT install required.
    e2e_cli: End-to-end tests for pce_cli_wrapper (UCS layer L3h, ADR-018). Hermetic — exercise discovery / install / uninstall / relay codepaths against synthesised ShimTarget records and a fake shim helper script (sys.executable + fake_shim.py). No real Claude Code CLI install required.
