# Mistral (chat.mistral.ai) — P5.C.5.2 YAML manifest.

schema_version: 1
name: mistral
provider: mistral
url: "https://chat.mistral.ai/chat"
display_name: "Mistral Le Chat"

selectors:
  input:
    - 'textarea[placeholder*="message" i]'
    - 'textarea[placeholder*="ask" i]'
    - 'div[role="textbox"][contenteditable="true"]'
    - "textarea"
  send_button:
    - 'button[type="submit"]'
    - 'button[aria-label*="send" i]'
  stop_button:
    - 'button[aria-label*="Stop" i]'
  response_container:
    - '[class*="assistant"] .prose'
    - '[class*="message"] .prose'
    - '[class*="markdown"]'
  login_wall:
    - 'a[href*="/login"]'
    - 'button[class*="login" i]'

timeouts_ms:
  response: 90000

tier: S1
plane:
  - N
  - H
