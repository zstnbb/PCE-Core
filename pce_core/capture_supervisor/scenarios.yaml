# SPDX-License-Identifier: Apache-2.0
# 13 P0 scenarios per Docs/stability/redundancy-sprint/SCOPE-LOCK-2026-05-15.md.
#
# Schema is versioned (see schema_version) so we can evolve the file without
# breaking older readers; bump on any breaking shape change.
#
# Independence rule (REDUNDANCY-AUDIT-MATRIX §1, ADR-021 §3.3):
#
#   Within a single scenario, every leg's `independent_basis` must be
#   unique. The supervisor refuses to load a scenario where two legs
#   share the same basis (counts as 1.5 legs, not 2 — see SCOPE-LOCK §2.1).
#
# Phase B markers (`phase_b: true`) suppress auto-issue alerts during the
# Phase B build-out window for the three Tier-β scenarios; cleared once
# Wave 6/7/8 close.
#
# `source` values must match `pce_core.capture_event.CaptureSource`.

schema_version: 1

scenarios:
