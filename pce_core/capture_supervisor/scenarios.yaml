    label: "ChatGPT Web (chatgpt.com)"
    tier: S0
    redundancy_target: 3
    phase_b: true   # v1.0: L1_mitm blocked by HSTS preload; L4b not yet built
    legs:
      - source: L1_mitm
        priority: 1
        independent_basis: chromium_net_stack
        beacon_target: chatgpt_web
        beacon_lane: browser
        beacon_layer: L1
      - source: L3a_browser_ext
        priority: 2
        independent_basis: page_dom
        beacon_target: chatgpt_web
        beacon_lane: browser
        beacon_layer: L3a
      - source: L3g_local_persistence
