<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PCE Capture</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>PCE</h1>
      <span class="version">v0.3.0</span>
    </div>

    <!-- Server + capture status -->
    <div class="status-row">
      <span class="label">Server</span>
      <span id="server-status" class="status-badge offline">Checking...</span>
    </div>

    <div class="status-row">
      <span class="label">Captures</span>
      <span id="capture-count" class="count">0</span>
    </div>

    <div class="toggle-row">
      <span class="label">Capture Enabled</span>
      <label class="switch">
        <input type="checkbox" id="enabled-toggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <!-- Current page detection status -->
    <div class="section-divider"></div>

    <div class="page-section">
      <div class="page-status-row">
        <span id="page-detection-icon" class="detection-icon">?</span>
        <div class="page-info">
          <span id="page-domain" class="page-domain">-</span>
          <span id="page-detection-text" class="page-detection-text">Checking page...</span>
        </div>
      </div>

      <button id="capture-page-btn" class="action-btn" disabled>
        Capture This Page
      </button>

      <button id="blacklist-btn" class="action-btn secondary" style="display:none;">
        Block This Site
      </button>

      <button id="unblacklist-btn" class="action-btn secondary" style="display:none;">
        Unblock This Site
      </button>
    </div>

    <!-- Footer -->
    <div class="footer">
      <a id="dashboard-link" href="#" title="Open PCE Dashboard">Dashboard ↗</a>
      <span class="separator">·</span>
      <span id="last-error" class="error-text"></span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
